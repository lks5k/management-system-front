<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marcas — IMSAS Gestión</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/app.css">
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/app.js"></script>
</head>
<body>
<div class="flex h-screen overflow-hidden" x-cloak x-show="session"
  x-data="{
    sidebarOpen: window.innerWidth >= 1024,
    session: null,
    loading: true,
    error: '',
    search: '',
    empresaFilter: '',
    marcas: [],
    empresasMap: {},
    empresasList: [],
    deletingId: null,
    get isAdmin() { return this.session?.role === 'SUPERADMIN' || this.session?.role === 'ADMIN'; },
    async eliminar(id) {
      if (!confirm('¿Eliminar esta marca? Esta acción no se puede deshacer.')) return;
      this.deletingId = id;
      this.error = '';
      try {
        await ImsasMarcas.eliminar(id);
        this.marcas = this.marcas.filter(m => m.id !== id);
      } catch (err) {
        this.error = imsasErrorMsg(err);
      } finally {
        this.deletingId = null;
      }
    },
    async init() {
      this.session = imsasRequireAuth();
      if (!this.session) return;
      try {
        const empPage = await ImsasEmpresas.listar({ size: 200 });
        const emps = empPage.content;
        this.empresasList = emps;
        emps.forEach(e => { this.empresasMap[e.id] = e.razonSocial; });
        const marcaPages = await Promise.all(
          emps.map(e => ImsasMarcas.listarPorEmpresa(e.id).catch(() => ({ content: [] })))
        );
        this.marcas = marcaPages.flatMap(r => r.content ?? []);
      } catch (err) {
        this.error = imsasErrorMsg(err);
      } finally {
        this.loading = false;
      }
    },
    get filtered() {
      return this.marcas.filter(m => {
        const matchSearch = !this.search || m.nombre.toLowerCase().includes(this.search.toLowerCase());
        const matchEmpresa = !this.empresaFilter || m.empresaId === this.empresaFilter;
        return matchSearch && matchEmpresa;
      });
    }
  }">

  <!-- SIDEBAR -->
  <div x-show="sidebarOpen" x-cloak @click="sidebarOpen = false"
       class="fixed inset-0 z-20 bg-black/30 lg:hidden"></div>
  <aside class="flex-shrink-0 flex flex-col h-screen fixed top-0 left-0 z-30 overflow-y-auto"
         x-show="sidebarOpen" x-cloak
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="-translate-x-full"
         x-transition:enter-end="translate-x-0"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="translate-x-0"
         x-transition:leave-end="-translate-x-full"
         style="width:240px;background-color:#E8EEF4;border-right:1px solid #D1DCE5;">
    <div class="h-16 flex items-center px-4 gap-3 flex-shrink-0" style="border-bottom:1px solid #D1DCE5;">
      <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background-color:#4A7FA5;">
        <svg class="w-4 h-4" fill="none" stroke="white" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
      </div>
      <div><p class="text-sm font-bold" style="color:#1A2B3C;">IMSAS</p><p class="text-xs" style="color:#4A7FA5;">Gestión de Producción</p></div>
    </div>
    <nav class="flex-1 py-4 px-3 space-y-1">
      <p class="text-xs font-semibold uppercase tracking-wider px-2 mb-2" style="color:#4A7FA5;opacity:.7;">Principal</p>
      <a href="dashboard.html" class="sidebar-link"><svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Dashboard</a>
      <p class="text-xs font-semibold uppercase tracking-wider px-2 mt-5 mb-2" style="color:#4A7FA5;opacity:.7;">Maestros</p>
      <a href="empresas.html" class="sidebar-link"><svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>Empresas</a>
      <a href="contactos.html" class="sidebar-link"><svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>Contactos</a>
      <a href="marcas.html" class="sidebar-link active"><svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z"/></svg>Marcas</a>
      <a href="productos.html" class="sidebar-link"><svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>Productos</a>
      <p class="text-xs font-semibold uppercase tracking-wider px-2 mt-5 mb-2" style="color:#4A7FA5;opacity:.7;">Operaciones</p>
      <a href="solicitudes.html" class="sidebar-link"><svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>Solicitudes</a>
      <p class="text-xs font-semibold uppercase tracking-wider px-2 mt-5 mb-2" style="color:#4A7FA5;opacity:.7;" x-show="session?.role === 'SUPERADMIN' || session?.role === 'ADMIN'">Administración</p>
      <a href="usuarios.html" class="sidebar-link" x-show="session?.role === 'SUPERADMIN' || session?.role === 'ADMIN'"><svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>Usuarios</a>
    </nav>
    <div class="p-3" style="border-top:1px solid #D1DCE5;">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0" style="background-color:#4A7FA5;" x-text="session?.initials || '?'"></div>
        <div class="flex-1 min-w-0"><p class="text-xs font-semibold truncate" style="color:#1A2B3C;" x-text="session?.name || 'Usuario'"></p><p class="text-xs truncate" style="color:#4A7FA5;" x-text="session?.roleLabel || ''"></p></div>
        <button @click="imsasLogout()" title="Cerrar sesión"><svg class="w-4 h-4" style="color:#4A7FA5;" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg></button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="flex-1 flex flex-col overflow-hidden ml-0 lg:ml-60">
    <header class="h-16 flex items-center justify-between px-4 lg:px-6 flex-shrink-0" style="background:white;border-bottom:1px solid #D1DCE5;">
      <div class="flex items-center gap-3">
        <button @click="sidebarOpen = !sidebarOpen"
                class="lg:hidden p-1.5 rounded-lg -ml-1" style="color:#4A7FA5;">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        <div>
          <h1 class="text-base font-semibold" style="color:#1A2B3C;">Marcas</h1>
          <nav class="text-xs flex items-center gap-1" style="color:#9CA3AF;">
            <a href="dashboard.html" style="color:#4A7FA5;">Inicio</a><span>/</span><span>Marcas</span>
          </nav>
        </div>
      </div>
      <a href="marca-form.html" class="flex items-center gap-1.5 px-4 py-2 rounded-lg text-white text-sm font-medium" style="background-color:#2C5F7A;">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        Nueva Marca
      </a>
    </header>

    <main class="flex-1 overflow-y-auto p-6">

      <!-- Loading -->
      <div x-show="loading" class="flex items-center justify-center py-24">
        <div class="flex flex-col items-center gap-3">
          <svg class="w-8 h-8 animate-spin" style="color:#4A7FA5;" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
          <p class="text-sm" style="color:#6B7280;">Cargando marcas...</p>
        </div>
      </div>

      <!-- Error -->
      <div x-show="error && !loading" class="rounded-xl p-4 mb-4 flex items-start gap-3" style="background-color:#FEF2F2;border:1px solid #FECACA;">
        <svg class="w-4 h-4 flex-shrink-0 mt-0.5" style="color:#DC2626;" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <p class="text-sm" style="color:#DC2626;" x-text="error"></p>
      </div>

      <div x-show="!loading">

      <!-- Filters -->
      <div class="bg-white rounded-xl px-5 py-4 mb-4 flex flex-wrap items-center gap-4" style="border:1px solid #D1DCE5;">
        <div class="relative flex-1 min-w-48 max-w-sm">
          <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2" style="color:#9CA3AF;" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input type="text" x-model="search" placeholder="Buscar marca..."
                 class="w-full pl-9 pr-4 py-2 text-sm rounded-lg outline-none"
                 style="border:1px solid #D1DCE5;color:#1A2B3C;background:white;"
                 onfocus="this.style.borderColor='#4A7FA5'" onblur="this.style.borderColor='#D1DCE5'">
        </div>
        <div class="flex items-center gap-2">
          <label class="text-xs font-medium" style="color:#6B7280;">Empresa:</label>
          <select x-model="empresaFilter" class="text-sm rounded-lg py-2 pl-3 pr-8 outline-none"
                  style="border:1px solid #D1DCE5;color:#1A2B3C;background:white;"
                  onfocus="this.style.borderColor='#4A7FA5'" onblur="this.style.borderColor='#D1DCE5'">
            <option value="">Todas</option>
            <template x-for="emp in empresasList" :key="emp.id">
              <option :value="emp.id" x-text="emp.razonSocial"></option>
            </template>
          </select>
        </div>
        <button x-show="search || empresaFilter" @click="search=''; empresaFilter=''"
                class="text-xs px-3 py-2 rounded-lg" style="color:#DC2626;border:1px solid #FECACA;background:#FEF2F2;">
          Limpiar
        </button>
        <span class="text-xs ml-auto" style="color:#6B7280;"><span x-text="filtered.length"></span> marca(s)</span>
      </div>

      <!-- Grid Cards -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
        <template x-for="marca in filtered" :key="marca.id">
          <div class="bg-white rounded-xl p-5 flex flex-col" style="border:1px solid #D1DCE5;"
               onmouseover="this.style.borderColor='#4A7FA5';this.style.boxShadow='0 4px 12px rgba(74,127,165,0.1)'"
               onmouseout="this.style.borderColor='#D1DCE5';this.style.boxShadow='none'">
            <!-- Brand icon -->
            <div class="w-10 h-10 rounded-xl flex items-center justify-center mb-3" style="background-color:#E8EEF4;">
              <svg class="w-5 h-5" style="color:#4A7FA5;" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z"/></svg>
            </div>
            <h3 class="text-sm font-bold mb-1" style="color:#1A2B3C;" x-text="marca.nombre"></h3>
            <a :href="'empresa-form.html?id=' + marca.empresaId" class="text-xs mb-3" style="color:#4A7FA5;" x-text="empresasMap[marca.empresaId] || '—'"></a>
            <div class="flex items-center justify-between mt-auto pt-4" style="border-top:1px solid #F4F7FA;">
              <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium"
                    :style="marca.activo ? 'background:#D1FAE5;color:#059669;' : 'background:#FEE2E2;color:#DC2626;'"
                    x-text="marca.activo ? 'Activa' : 'Inactiva'"></span>
              <a :href="'marca-form.html?id=' + marca.id + '&empresaId=' + marca.empresaId"
                 class="inline-flex items-center gap-1 px-2.5 py-1.5 rounded-lg text-xs font-medium"
                 style="background-color:#F4F7FA;color:#1A2B3C;border:1px solid #D1DCE5;"
                 onmouseover="this.style.backgroundColor='#E8EEF4'" onmouseout="this.style.backgroundColor='#F4F7FA'">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                Editar
              </a>
              <button x-show="isAdmin" @click="eliminar(marca.id)" :disabled="deletingId === marca.id"
                      class="inline-flex items-center gap-1 px-2.5 py-1.5 rounded-lg text-xs font-medium"
                      style="background-color:#FEF2F2;color:#DC2626;border:1px solid #FECACA;"
                      onmouseover="this.style.backgroundColor='#FEE2E2'" onmouseout="this.style.backgroundColor='#FEF2F2'">
                <svg x-show="deletingId !== marca.id" class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                <svg x-show="deletingId === marca.id" class="w-3 h-3 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
                Eliminar
              </button>
            </div>
          </div>
        </template>

        <!-- Empty state -->
        <div x-show="filtered.length === 0" class="col-span-full py-16 text-center">
          <svg class="w-10 h-10 mx-auto mb-3" style="color:#D1DCE5;" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z"/></svg>
          <p class="text-sm font-medium" style="color:#6B7280;">No se encontraron marcas</p>
        </div>
      </div>

      </div><!-- /x-show="!loading" -->

    </main>
  </div>
</div>
</body>
</html>
