<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuario — IMSAS Gestión</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/app.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/app.css">
</head>
<body>
<div class="flex h-screen overflow-hidden"
  x-data="{
    sidebarOpen: window.innerWidth >= 1024,
    session: null,
    editMode: false,
    usuarioId: null,
    isOwnUser: false,
    loading: true,
    saving: false,
    saved: false,
    error: '',
    errors: {},
    roles: ['SUPERADMIN', 'ADMIN', 'MANAGER', 'OPERATOR', 'SALES_REP'],
    rolLabels: { SUPERADMIN: 'Super Administrador', ADMIN: 'Administrador', MANAGER: 'Operario líder', OPERATOR: 'Operario', SALES_REP: 'Asesor Comercial' },
    form: { nombre: '', email: '', password: '', rol: '' },
    async init() {
      this.session = imsasRequireAuth();
      if (!this.session) return;
      if (this.session.role !== 'SUPERADMIN' && this.session.role !== 'ADMIN') {
        window.location.href = 'dashboard.html';
        return;
      }
      const params = new URLSearchParams(window.location.search);
      this.usuarioId = params.get('id');
      this.editMode  = !!this.usuarioId;
      try {
        if (this.editMode) {
          const u = await ImsasUsuarios.obtener(this.usuarioId);
          this.form.nombre = u.nombre;
          this.form.email  = u.email;
          this.form.rol    = u.rol;
          this.isOwnUser   = u.id === this.session.id;
        }
      } catch (err) {
        this.error = imsasErrorMsg(err);
      } finally {
        this.loading = false;
      }
    },
    validate() {
      this.errors = {};
      if (!this.form.nombre.trim()) this.errors.nombre = 'El nombre es requerido';
      if (!this.form.email.trim()) this.errors.email = 'El correo es requerido';
      else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(this.form.email.trim())) this.errors.email = 'Ingrese un correo válido';
      if (!this.editMode && !this.form.password) this.errors.password = 'La contraseña es requerida';
      if (!this.editMode && this.form.password && this.form.password.length < 6) this.errors.password = 'Mínimo 6 caracteres';
      if (!this.form.rol) this.errors.rol = 'Seleccione un rol';
      return Object.keys(this.errors).length === 0;
    },
    async save() {
      if (!this.validate()) return;
      this.saving = true;
      this.error = '';
      try {
        if (this.editMode) {
          await ImsasUsuarios.actualizar(this.usuarioId, {
            nombre: this.form.nombre.trim(),
            email:  this.form.email.trim().toLowerCase(),
            rol:    this.form.rol
          });
        } else {
          await ImsasUsuarios.crear({
            nombre:   this.form.nombre.trim(),
            email:    this.form.email.trim().toLowerCase(),
            password: this.form.password,
            rol:      this.form.rol
          });
        }
        this.saved = true;
        setTimeout(() => window.location.href = 'usuarios.html', 1400);
      } catch (err) {
        if (err.status === 409) {
          this.errors.email = 'Ya existe un usuario con ese correo electrónico';
        } else {
          this.error = imsasErrorMsg(err);
        }
      } finally {
        this.saving = false;
      }
    }
  }">

  <!-- SIDEBAR overlay -->
  <div x-show="sidebarOpen" x-cloak @click="sidebarOpen = false"
       class="fixed inset-0 z-20 bg-black/30 lg:hidden"></div>
  <aside class="flex-shrink-0 flex flex-col h-screen fixed top-0 left-0 z-30 overflow-y-auto"
         x-show="sidebarOpen" x-cloak
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="-translate-x-full"
         x-transition:enter-end="translate-x-0"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="translate-x-0"
         x-transition:leave-end="-translate-x-full"
         style="width:240px;background-color:#E8EEF4;border-right:1px solid #D1DCE5;">
    <div class="h-16 flex items-center px-4 gap-3 flex-shrink-0" style="border-bottom:1px solid #D1DCE5;">
      <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background-color:#4A7FA5;">
        <svg class="w-4 h-4" fill="none" stroke="white" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
      </div>
      <div><p class="text-sm font-bold" style="color:#1A2B3C;">IMSAS</p><p class="text-xs" style="color:#4A7FA5;">Gestión de Producción</p></div>
    </div>
    <nav class="flex-1 py-4 px-3 space-y-1">
      <p class="text-xs font-semibold uppercase tracking-wider px-2 mb-2" style="color:#4A7FA5;opacity:.7;">Principal</p>
      <a href="dashboard.html" class="sidebar-link"><svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Dashboard</a>
      <p class="text-xs font-semibold uppercase tracking-wider px-2 mt-5 mb-2" style="color:#4A7FA5;opacity:.7;">Maestros</p>
      <a href="empresas.html" class="sidebar-link"><svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>Empresas</a>
      <a href="contactos.html" class="sidebar-link"><svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>Contactos</a>
      <a href="marcas.html" class="sidebar-link"><svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z"/></svg>Marcas</a>
      <a href="productos.html" class="sidebar-link"><svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>Productos</a>
      <p class="text-xs font-semibold uppercase tracking-wider px-2 mt-5 mb-2" style="color:#4A7FA5;opacity:.7;">Operaciones</p>
      <a href="solicitudes.html" class="sidebar-link"><svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>Solicitudes</a>
      <p class="text-xs font-semibold uppercase tracking-wider px-2 mt-5 mb-2" style="color:#4A7FA5;opacity:.7;">Administración</p>
      <a href="usuarios.html" class="sidebar-link active"><svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>Usuarios</a>
    </nav>
    <div class="p-3" style="border-top:1px solid #D1DCE5;">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0" style="background-color:#4A7FA5;" x-text="session?.initials||'?'"></div>
        <div class="flex-1 min-w-0"><p class="text-xs font-semibold truncate" style="color:#1A2B3C;" x-text="session?.name||'Usuario'"></p><p class="text-xs truncate" style="color:#4A7FA5;" x-text="session?.roleLabel||''"></p></div>
        <button @click="imsasLogout()" title="Cerrar sesión"><svg class="w-4 h-4" style="color:#4A7FA5;" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg></button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="flex-1 flex flex-col overflow-hidden ml-0 lg:ml-60">
    <header class="h-16 flex items-center justify-between px-4 lg:px-6 flex-shrink-0" style="background:white;border-bottom:1px solid #D1DCE5;">
      <div class="flex items-center gap-3">
        <button @click="sidebarOpen = !sidebarOpen"
                class="lg:hidden p-1.5 rounded-lg -ml-1" style="color:#4A7FA5;">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        <div>
          <h1 class="text-base font-semibold" style="color:#1A2B3C;" x-text="editMode ? 'Editar Usuario' : 'Nuevo Usuario'"></h1>
          <nav class="text-xs flex items-center gap-1" style="color:#9CA3AF;">
            <a href="dashboard.html" style="color:#4A7FA5;">Inicio</a><span>/</span>
            <a href="usuarios.html" style="color:#4A7FA5;">Usuarios</a><span>/</span>
            <span x-text="editMode ? 'Editar' : 'Crear'"></span>
          </nav>
        </div>
      </div>
    </header>

    <!-- Toast -->
    <div x-show="saved" x-cloak x-transition class="fixed top-5 right-5 z-50 flex items-center gap-3 px-4 py-3 rounded-xl shadow-lg text-sm font-medium text-white" style="background-color:#059669;">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
      Usuario guardado correctamente
    </div>

    <main class="flex-1 overflow-y-auto p-6">
      <div class="max-w-xl mx-auto">

        <!-- Loading -->
        <div x-show="loading" class="flex items-center justify-center py-24">
          <svg class="w-7 h-7 animate-spin" style="color:#4A7FA5;" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
        </div>

        <!-- Error general -->
        <div x-show="error && !loading" class="rounded-xl p-4 mb-4 flex items-start gap-3" style="background-color:#FEF2F2;border:1px solid #FECACA;">
          <svg class="w-4 h-4 flex-shrink-0 mt-0.5" style="color:#DC2626;" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <p class="text-sm" style="color:#DC2626;" x-text="error"></p>
        </div>

        <form x-show="!loading" @submit.prevent="save()" novalidate>
          <div class="bg-white rounded-xl p-6 mb-5" style="border:1px solid #D1DCE5;">
            <h2 class="text-sm font-semibold mb-5 pb-4" style="color:#1A2B3C;border-bottom:1px solid #D1DCE5;">Datos del usuario</h2>

            <div class="space-y-5">

              <!-- Nombre -->
              <div>
                <label class="input-label">Nombre completo <span style="color:#EF4444;">*</span></label>
                <input type="text" x-model="form.nombre"
                       :class="errors.nombre ? 'error' : ''" class="input-field"
                       placeholder="Ej: Carlos Rodríguez"
                       onfocus="this.style.borderColor='#4A7FA5'" onblur="this.style.borderColor=this.classList.contains('error')?'#EF4444':'#D1DCE5'">
                <p x-show="errors.nombre" x-text="errors.nombre" class="text-xs mt-1.5" style="color:#EF4444;"></p>
              </div>

              <!-- Email -->
              <div>
                <label class="input-label">Correo electrónico <span style="color:#EF4444;">*</span></label>
                <input type="email" x-model="form.email"
                       :class="errors.email ? 'error' : ''" class="input-field"
                       placeholder="usuario@imsas.com"
                       onfocus="this.style.borderColor='#4A7FA5'" onblur="this.style.borderColor=this.classList.contains('error')?'#EF4444':'#D1DCE5'">
                <p x-show="errors.email" x-text="errors.email" class="text-xs mt-1.5" style="color:#EF4444;"></p>
              </div>

              <!-- Contraseña — solo en creación -->
              <div x-show="!editMode">
                <label class="input-label">Contraseña <span style="color:#EF4444;">*</span></label>
                <input type="password" x-model="form.password"
                       :class="errors.password ? 'error' : ''" class="input-field"
                       placeholder="Mínimo 6 caracteres"
                       onfocus="this.style.borderColor='#4A7FA5'" onblur="this.style.borderColor=this.classList.contains('error')?'#EF4444':'#D1DCE5'">
                <p x-show="errors.password" x-text="errors.password" class="text-xs mt-1.5" style="color:#EF4444;"></p>
              </div>

              <!-- Rol -->
              <div>
                <label class="input-label">Rol <span style="color:#EF4444;">*</span></label>
                <select x-model="form.rol"
                        :disabled="isOwnUser"
                        :class="errors.rol ? 'error' : ''" class="input-field"
                        :style="isOwnUser ? 'opacity:0.6;cursor:not-allowed;' : ''"
                        onfocus="this.style.borderColor='#4A7FA5'" onblur="this.style.borderColor=this.classList.contains('error')?'#EF4444':'#D1DCE5'">
                  <option value="">Seleccionar rol...</option>
                  <template x-for="r in roles" :key="r">
                    <option :value="r" x-text="rolLabels[r]"></option>
                  </template>
                </select>
                <p x-show="errors.rol" x-text="errors.rol" class="text-xs mt-1.5" style="color:#EF4444;"></p>
                <p x-show="isOwnUser" class="text-xs mt-1.5" style="color:#9CA3AF;">No puedes cambiar tu propio rol.</p>
              </div>

            </div>
          </div>

          <!-- Acciones -->
          <div class="flex items-center justify-between">
            <a href="usuarios.html" class="inline-flex items-center gap-2 px-5 py-2.5 rounded-lg text-sm font-medium"
               style="background:white;color:#1A2B3C;border:1px solid #D1DCE5;">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
              Cancelar
            </a>
            <button type="submit" :disabled="saving"
                    class="inline-flex items-center gap-2 px-6 py-2.5 rounded-lg text-sm font-medium text-white"
                    style="background-color:#2C5F7A;"
                    onmouseover="this.style.backgroundColor='#1A4A60'" onmouseout="this.style.backgroundColor='#2C5F7A'">
              <svg x-show="!saving" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
              <svg x-show="saving" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
              <span x-text="editMode ? 'Guardar cambios' : 'Crear usuario'"></span>
            </button>
          </div>
        </form>

      </div>
    </main>
  </div>
</div>
</body>
</html>
