<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — IMSAS Gestión</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/app.css">
  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4" style="background-color: #F4F7FA;">

  <div
    x-data="{
      email: '',
      password: '',
      showPassword: false,
      loading: false,
      showError: false,
      errors: {},
      validate() {
        this.errors = {};
        if (!this.email) this.errors.email = 'El correo es requerido';
        else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(this.email)) this.errors.email = 'Formato de correo inválido';
        if (!this.password) this.errors.password = 'La contraseña es requerida';
        return Object.keys(this.errors).length === 0;
      },
      errorMsg: '',
      async submit() {
        if (!this.validate()) return;
        this.loading = true;
        this.showError = false;
        this.errorMsg = '';
        try {
          await imsasLogin(this.email, this.password);
          window.location.href = 'pages/dashboard.html';
        } catch (err) {
          this.showError = true;
          this.errorMsg = err.status === 401
            ? 'Correo o contraseña incorrectos. Intente nuevamente.'
            : imsasErrorMsg(err);
        } finally {
          this.loading = false;
        }
      },
      fillCredential(email, password) {
        this.email = email;
        this.password = password;
        this.showError = false;
        this.errors = {};
      },
      init() {
        if (imsasGetSession() && imsasGetToken()) {
          window.location.href = 'pages/dashboard.html';
        }
      }
    }"
    x-init="init()"
    class="w-full max-w-sm"
  >

    <!-- Logo + Brand -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl mb-4" style="background-color: #4A7FA5;">
        <svg class="w-8 h-8" fill="none" stroke="white" viewBox="0 0 24 24" stroke-width="1.75">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold" style="color: #1A2B3C;">IMSAS</h1>
      <p class="text-sm mt-1" style="color: #4A7FA5;">Sistema de Gestión de Producción</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl p-8 shadow-sm" style="border: 1px solid #D1DCE5;">
      <h2 class="text-lg font-semibold mb-6" style="color: #1A2B3C;">Iniciar sesión</h2>

      <!-- Error global -->
      <div
        x-show="showError"
        x-cloak
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0 -translate-y-1"
        x-transition:enter-end="opacity-100 translate-y-0"
        class="flex items-center gap-3 p-3 rounded-lg mb-5 text-sm"
        style="background-color: #FEE2E2; color: #DC2626; border: 1px solid #FECACA;"
      >
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span x-text="errorMsg || 'Correo o contraseña incorrectos. Intente nuevamente.'"></span>
      </div>

      <form @submit.prevent="submit" novalidate>

        <!-- Email -->
        <div class="mb-4">
          <label class="block text-sm font-medium mb-1.5" style="color: #1A2B3C;">
            Correo electrónico
          </label>
          <input
            type="email"
            x-model="email"
            @blur="validate()"
            :class="errors.email ? 'error' : ''"
            class="login-input"
            placeholder="usuario@imsas.com"
            autocomplete="email"
          >
          <p x-show="errors.email" x-text="errors.email" class="text-xs mt-1.5" style="color: #EF4444;"></p>
        </div>

        <!-- Password -->
        <div class="mb-6">
          <label class="block text-sm font-medium mb-1.5" style="color: #1A2B3C;">
            Contraseña
          </label>
          <div class="relative">
            <input
              :type="showPassword ? 'text' : 'password'"
              x-model="password"
              @blur="validate()"
              :class="errors.password ? 'error' : ''"
              class="login-input pr-10"
              placeholder="••••••••"
              autocomplete="current-password"
            >
            <button
              type="button"
              @click="showPassword = !showPassword"
              class="absolute right-3 top-1/2 -translate-y-1/2"
              style="color: #4A7FA5;"
            >
              <svg x-show="!showPassword" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <svg x-show="showPassword" x-cloak class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
              </svg>
            </button>
          </div>
          <p x-show="errors.password" x-text="errors.password" class="text-xs mt-1.5" style="color: #EF4444;"></p>
        </div>

        <!-- Submit button -->
        <button
          type="submit"
          :disabled="loading"
          class="w-full flex items-center justify-center gap-2 py-2.5 px-4 rounded-lg font-medium text-sm text-white transition-all"
          style="background-color: #2C5F7A;"
          :style="loading ? 'opacity: 0.7; cursor: not-allowed;' : 'cursor: pointer;'"
          onmouseover="if(!this.disabled) this.style.backgroundColor='#1A4A60'"
          onmouseout="this.style.backgroundColor='#2C5F7A'"
        >
          <svg x-show="loading" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="white" stroke-width="4"></circle>
            <path class="opacity-75" fill="white" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
          <span x-text="loading ? 'Verificando...' : 'Ingresar al sistema'"></span>
        </button>

      </form>
    </div>

    <!-- Credenciales de prueba — 6 roles -->
    <div class="mt-4 p-4 rounded-xl" style="background-color: #E8EEF4; border: 1px solid #D1DCE5;">
      <p class="text-xs font-semibold mb-3 text-center" style="color: #4A7FA5;">
        Credenciales de prueba — clic para autocompletar
      </p>
      <div class="space-y-1.5">

        <button type="button" @click="fillCredential('superadmin@imsas.com','superadmin123')"
                class="w-full flex items-center justify-between px-3 py-2 rounded-lg text-xs transition-colors bg-white hover:bg-[#F4F7FA]"
                style="border:1px solid #D1DCE5;">
          <div class="flex items-center gap-2">
            <span class="w-5 h-5 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0" style="background-color:#1A2B3C;">SA</span>
            <span style="color:#1A2B3C;">superadmin@imsas.com</span>
          </div>
          <span style="color:#9CA3AF;">Super Admin</span>
        </button>

        <button type="button" @click="fillCredential('admin@imsas.com','admin123')"
                class="w-full flex items-center justify-between px-3 py-2 rounded-lg text-xs transition-colors bg-white hover:bg-[#F4F7FA]"
                style="border:1px solid #D1DCE5;">
          <div class="flex items-center gap-2">
            <span class="w-5 h-5 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0" style="background-color:#2C5F7A;">AM</span>
            <span style="color:#1A2B3C;">admin@imsas.com</span>
          </div>
          <span style="color:#9CA3AF;">Administrador</span>
        </button>

        <button type="button" @click="fillCredential('manager@imsas.com','manager123')"
                class="w-full flex items-center justify-between px-3 py-2 rounded-lg text-xs transition-colors bg-white hover:bg-[#F4F7FA]"
                style="border:1px solid #D1DCE5;">
          <div class="flex items-center gap-2">
            <span class="w-5 h-5 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0" style="background-color:#4A7FA5;">MT</span>
            <span style="color:#1A2B3C;">manager@imsas.com</span>
          </div>
          <span style="color:#9CA3AF;">Gerente</span>
        </button>

        <button type="button" @click="fillCredential('operator@imsas.com','operator123')"
                class="w-full flex items-center justify-between px-3 py-2 rounded-lg text-xs transition-colors bg-white hover:bg-[#F4F7FA]"
                style="border:1px solid #D1DCE5;">
          <div class="flex items-center gap-2">
            <span class="w-5 h-5 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0" style="background-color:#059669;">OR</span>
            <span style="color:#1A2B3C;">operator@imsas.com</span>
          </div>
          <span style="color:#9CA3AF;">Operador</span>
        </button>

        <button type="button" @click="fillCredential('sales-rep@imsas.com','salesrep123')"
                class="w-full flex items-center justify-between px-3 py-2 rounded-lg text-xs transition-colors bg-white hover:bg-[#F4F7FA]"
                style="border:1px solid #D1DCE5;">
          <div class="flex items-center gap-2">
            <span class="w-5 h-5 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0" style="background-color:#7C3AED;">SG</span>
            <span style="color:#1A2B3C;">sales-rep@imsas.com</span>
          </div>
          <span style="color:#9CA3AF;">Asesor Comercial</span>
        </button>

      </div>
    </div>

    <!-- Footer -->
    <p class="text-center text-xs mt-5" style="color: #9CA3AF;">
      IMSAS · Sistema de Gestión de Producción · V1
    </p>

  </div>

</body>
</html>
